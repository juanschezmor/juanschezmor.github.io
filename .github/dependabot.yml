version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      frontend-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
      - dependency-name: "@eslint/js"
        update-types:
          - version-update:semver-major
      - dependency-name: eslint-plugin-react-hooks
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: /aws/content-lambdas
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      lambda-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
