name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  lambdas:
    name: Lambda package checks
    runs-on: ubuntu-latest

    strategy:
      matrix:
        lambda-package:
          - aws/content-lambdas
          - aws/skills-lambdas

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.lambda-package }}/package-lock.json

      - name: Install Lambda dependencies
        working-directory: ${{ matrix.lambda-package }}
        run: npm ci
